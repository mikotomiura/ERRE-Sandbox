scope_drop:
  - id: kant_pr23_subcorpus3_dropped
    intended_title: "Was heißt: sich im Denken orientiren? (1786) + Über den Gemeinspruch (1793)"
    intended_target_tokens: "~15k"
    drop_reason: |
      DPN23-1 #1 alternate binding = Projekt Gutenberg-DE + Wikisource (Bd. VIII) +
      Project Gutenberg US の 3 系統で URI verify した結果 「いずれも作品存在せず」
      (Codex MEDIUM-2 訂正、 当初 "2 系統" 表記を実態 3 系統に整合):
        (a) www.projekt-gutenberg.org : Cloudflare challenge で API 経由
            取得不可 (HTML 403 Forbidden + JS challenge、 Phase 1-A
            envelope 内で迂回困難)
        (b) de.wikisource.org : opensearch API + Kant index page
            (/wiki/Immanuel_Kant) どちらも該当 entry 不在 (1786 Orientiren +
            1793 Gemeinspruch は de.wikisource に未収録、 article ID 0
            empirical 確認)
        (c) Project Gutenberg US : Kant ebook search で 「Bd. V のみ」 +
            「Kritik der reinen Vernunft」 等あり、 「orientiren」
            「Gemeinspruch」 単独 ebook なし
      DPN23-1 #1 binding の 「不在なら scope から落とす」 条件発動。
      sub-corpus 1 = Bd. V full content (~140k tokens) で envelope target
      (~50k → ~150k overshoot) を吸収 = 案 A full Bd. V escalate route
      pre-register 済 (DPN23-0 トレードオフ + 残リスク section).
    blockers_ref: "blockers.md ブロッカー 1 → 本 _provenance.yaml の scope_drop で
      解消 (= 'Bd. V full content で代替' 経路採用)"
