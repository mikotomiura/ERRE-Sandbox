    source_ref: "fixture:synthetic_4th_mcq.yaml#roleeval_synthetic_4th_02"
    source_grade: fact
    category_subscore_eligible: true
    present_in_persona_prompt: false
    expected_zone: study
    expected_turn_count: 1
    fictional: true
