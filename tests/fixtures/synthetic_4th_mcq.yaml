  - stimulus_id: roleeval_synthetic_4th_03
    category: roleeval
    mcq_subcategory: practice
    prompt_text: |
      What daily ritual is the synthetic 4th persona said to practice?
    options:
      A: "Pre-dawn arithmetic exercises"
      B: "Walking three concentric circles before noon"
      C: "Silent recitation of imagined dialogues at dusk"
      D: "Cataloguing minerals once per lunar cycle"
    correct_option: D
    source_ref: "fixture:synthetic_4th_mcq.yaml#roleeval_synthetic_4th_03"
    source_grade: legend
    category_subscore_eligible: false
