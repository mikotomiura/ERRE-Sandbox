# Stimulus battery — 千利休 Sen no Rikyū (m9-eval-system P2a)
#
# 70 stimulus = wachsmuth 30 + tom_chashitsu 20 + roleeval 10 + moral_dilemma 10
#
# Refs:
#   - golden/stimulus/_schema.yaml
#   - personas/rikyu.yaml (cognitive_habits / preferred_zones / sampling override)

persona_id: rikyu
schema_version: "0.1.0-m9eval-p2a"
total_count: 70
category_counts:
  wachsmuth: 30
  tom_chashitsu: 20
  roleeval: 10
  moral_dilemma: 10

metadata:
  drafted_by: claude-opus-4-7
  drafted_date: "2026-05-01"
  notes: |
    利休 prefer は chashitsu / garden / study。Toulmin は wabi の価値判断・道具割・
    間 (ma) の使用・茶禅一味を主軸、商人出身の objectives 値定の論理を embedded。
    ToM は chashitsu 主体 (主客・点前・道具を介した非対称情報構造)、武家 vs 茶人の
    身分逆転を recursive 場面で活用。MCQ の present_in_persona_prompt は true 6
    (cognitive_habits に 6 件の attested fact が明示されている persona) / false 4 で
    調整 (4-6 範囲 Codex MEDIUM-4 遵守)。Rikyū は legend 含有率が他 persona より
    高く、source_grade=legend を意図的に複数 stimulus に配置 (scoring exclude 化)。
    `category_subscore_eligible: false` を厳密運用し、scored 8/10 で運用。

stimuli:
  # ============================================================
  # Wachsmuth Toulmin (30) — 茶の湯に内在する argumentation を引き出す
  # ============================================================

  # claim ×8
  - stimulus_id: wachsmuth_rikyu_01
    category: wachsmuth
    toulmin_target: claim
    prompt_text: |
      ひとつの文で、例も故実も持ち出さず述べよ — 「侘び」とは何の謂か。
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_02
    category: wachsmuth
    toulmin_target: claim
    prompt_text: |
      State, in one sentence, your central claim about the relation between
      tea and Zen. No history yet — only the claim.
    expected_zone: study
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_03
    category: wachsmuth
    toulmin_target: claim
    prompt_text: |
      露地に立ち、覚書なしに述べよ — 主客の関係において「礼」とは何か。
    expected_zone: garden
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_04
    category: wachsmuth
    toulmin_target: claim
    prompt_text: |
      若い弟子が問う —「価値とは何で決まるのか」。物語ではなく、断言で答えよ。
    expected_zone: study
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_05
    category: wachsmuth
    toulmin_target: claim
    prompt_text: |
      In a single declarative sentence: what is your claim about why a humble
      Korean bowl can be worth more than a famous Chinese one?
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_06
    category: wachsmuth
    toulmin_target: claim
    prompt_text: |
      理由なく断言せよ — 茶室の暗さは何のためにあるのか。
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_07
    category: wachsmuth
    toulmin_target: claim
    prompt_text: |
      一期一会 — その本義をひと言で述べよ。例ではなく、主張として。
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_08
    category: wachsmuth
    toulmin_target: claim
    prompt_text: |
      Make a single, defensible claim about the proper relation between host
      and guest — leave the explanation for later turns.
    expected_zone: chashitsu
    expected_turn_count: 2

  # data ×6
  - stimulus_id: wachsmuth_rikyu_09
    category: wachsmuth
    toulmin_target: data
    prompt_text: |
      汝はこう述べた —「貴重なものほど目立たぬ」。具体的な道具、ひとつの茶碗を
      挙げよ。解釈はまだ要らぬ、ただ事物を。
    expected_zone: study
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_10
    category: wachsmuth
    toulmin_target: data
    prompt_text: |
      Cite one observation from the way water sounds when nearing boil that
      serves as data for your claim about auditory attention in the tea room.
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_11
    category: wachsmuth
    toulmin_target: data
    prompt_text: |
      露地を歩くなかで、汝の歩調を遅くする具体的な飛石の配置をひとつ挙げよ。解釈は
      まだ加えず。
    expected_zone: garden
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_12
    category: wachsmuth
    toulmin_target: data
    prompt_text: |
      What single observation from a guest crawling through the nijiri-guchi
      serves as your evidence that posture changes attention?
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_13
    category: wachsmuth
    toulmin_target: data
    prompt_text: |
      座った客の手の置き方、視線の落ち方 — 具体的な所作をひとつ、汝の主張の
      データとして引け。
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_14
    category: wachsmuth
    toulmin_target: data
    prompt_text: |
      堺の市場で値付けをした経験から、ひとつの記憶を — 価値の判断にとっての
      Datum として引き出せ。
    expected_zone: study
    expected_turn_count: 2

  # warrant ×8
  - stimulus_id: wachsmuth_rikyu_15
    category: wachsmuth
    toulmin_target: warrant
    prompt_text: |
      汝は主張と Datum を述べた。具体的な道具から「価値の本義」へ進む — その
      移行を許す一般原則を述べよ。
    expected_zone: study
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_16
    category: wachsmuth
    toulmin_target: warrant
    prompt_text: |
      Why does the experience of body posture warrant the move from "physical
      stooping" to "social re-leveling"? State the warrant, not the example.
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_17
    category: wachsmuth
    toulmin_target: warrant
    prompt_text: |
      松風の音から「客の集中の質が変わる」へ進むこと — その推論を支える原則は
      何か。一般則のかたちで答えよ。
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_18
    category: wachsmuth
    toulmin_target: warrant
    prompt_text: |
      若侍が問う —「貴賤を一座に並べる」茶の理屈はなにか。例ではなく、許容の
      原則として答えよ。
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_19
    category: wachsmuth
    toulmin_target: warrant
    prompt_text: |
      State the warrant that lets you move from "this bowl is irreplaceable"
      to "the patron must accept the tea master's authority."
    expected_zone: study
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_20
    category: wachsmuth
    toulmin_target: warrant
    prompt_text: |
      露地の暗さから茶室の集中へ — その移行を保証する一般原則を述べよ。
    expected_zone: garden
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_21
    category: wachsmuth
    toulmin_target: warrant
    prompt_text: |
      長き正座から「身が静まる」を主張する — その推論の一般原則を、身体的事実から
      心の調和へ橋を架ける形で示せ。
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_22
    category: wachsmuth
    toulmin_target: warrant
    prompt_text: |
      In one sentence: what general principle warrants the inference from
      "deliberately overvalued material" to "successful inversion of social
      asymmetry"?
    expected_zone: study
    expected_turn_count: 2

  # backing ×4
  - stimulus_id: wachsmuth_rikyu_23
    category: wachsmuth
    toulmin_target: backing
    prompt_text: |
      汝は一般原則を述べた。それを支える、より深い伝統 — 禅の系譜なり、堺の
      商人の知なり、あるいは汝の師武野紹鷗の教えなり — を引け。
    expected_zone: study
    expected_turn_count: 3

  - stimulus_id: wachsmuth_rikyu_24
    category: wachsmuth
    toulmin_target: backing
    prompt_text: |
      What body of work or master-tradition backs your warrant that "wabi" is
      not poverty but a calibrated form of attention?
    expected_zone: study
    expected_turn_count: 3

  - stimulus_id: wachsmuth_rikyu_25
    category: wachsmuth
    toulmin_target: backing
    prompt_text: |
      汝の主張を支えるもの — 南方録に編まれた覚書、あるいは武野紹鷗・村田珠光から
      受け継いだ筋 — を、ひとつ具体的に挙げよ。
    expected_zone: study
    expected_turn_count: 3

  - stimulus_id: wachsmuth_rikyu_26
    category: wachsmuth
    toulmin_target: backing
    prompt_text: |
      Provide the backing — not just the warrant — for your claim that tea
      and Zen share a single way (茶禅一味).
    expected_zone: study
    expected_turn_count: 3

  # qualifier ×2
  - stimulus_id: wachsmuth_rikyu_27
    category: wachsmuth
    toulmin_target: qualifier
    prompt_text: |
      汝の「価値の見立て」はどの範囲で通じるか — 限定の条件を、主張ではなく
      qualifier として示せ。
    expected_zone: study
    expected_turn_count: 2

  - stimulus_id: wachsmuth_rikyu_28
    category: wachsmuth
    toulmin_target: qualifier
    prompt_text: |
      State the qualifier that limits your claim about silence (間, ma) — under
      what conditions does silence become signal rather than absence?
    expected_zone: chashitsu
    expected_turn_count: 2

  # rebuttal ×2
  - stimulus_id: wachsmuth_rikyu_29
    category: wachsmuth
    toulmin_target: rebuttal
    prompt_text: |
      ある武家方が言う —「躙口は形式の遊戯にすぎず、武人の威儀を損なう」。
      反論は留保し、Rebuttal の条件 — 汝の立場が成り立つ範囲 — を述べよ。
    expected_zone: chashitsu
    expected_turn_count: 3

  - stimulus_id: wachsmuth_rikyu_30
    category: wachsmuth
    toulmin_target: rebuttal
    prompt_text: |
      A reader objects that your overvaluation of humble bowls is itself a
      cunning form of merchant pricing dressed as aesthetics. State the
      rebuttal condition under which your view stands.
    expected_zone: study
    expected_turn_count: 3

  # ============================================================
  # ToM info-asymmetric (20) — first 8 / second 8 / recursive 4
  # ============================================================

  # first_order ×8
  - stimulus_id: tom_rikyu_01
    category: tom_chashitsu
    asymmetry_axis: first_order
    hidden_information: |
      正客が今朝、京の屋敷で家臣の不調法を聞いて来ている。汝はまだ知らぬ。
    prompt_text: |
      茶事の始め、正客が床の前で常より長く一礼している。問わずして —
      正客はいま何を思うていると見るか。
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: tom_rikyu_02
    category: tom_chashitsu
    asymmetry_axis: first_order
    hidden_information: |
      The young apprentice has just learned that one of his teachers
      criticised your choice of utensils, but you do not yet know.
    prompt_text: |
      The apprentice avoids meeting your eyes when handing you the chashaku.
      What does he likely believe at this moment?
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: tom_rikyu_03
    category: tom_chashitsu
    asymmetry_axis: first_order
    hidden_information: |
      亭主の弟子が朝のうちに、選んでおいた茶杓に小さな疵を見つけ、別のものに
      代えてある。汝は知らされていない。
    prompt_text: |
      水屋から運ばれた茶杓を見て、弟子が一瞬目を伏せた。問わずして — 弟子は
      いま何を思うているか。
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: tom_rikyu_04
    category: tom_chashitsu
    asymmetry_axis: first_order
    hidden_information: |
      An armed retainer waiting outside knows the daimyō has changed his
      arrival time, but you have not yet been informed.
    prompt_text: |
      The retainer at the roji gate stands in an unusually attentive posture
      and avoids small talk with the gardener. What does he believe right
      now?
    expected_zone: garden
    expected_turn_count: 2

  - stimulus_id: tom_rikyu_05
    category: tom_chashitsu
    asymmetry_axis: first_order
    hidden_information: |
      老いた連客が、汝の使う水指の出自について別席で疑問を呈したが、本人は汝
      の前ではそれを口にせぬつもりでいる。
    prompt_text: |
      老いた客が水指を見つめる時間が、ほかの客より明らかに長い。問わずして —
      彼の心中は何を巡っているか。
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: tom_rikyu_06
    category: tom_chashitsu
    asymmetry_axis: first_order
    hidden_information: |
      A messenger from the Daitokuji temple has been told to wait until the
      tea has been served before delivering bad news.
    prompt_text: |
      The messenger sits in seiza outside the chashitsu, holding a sealed
      letter. What does he believe is the appropriate moment for him?
    expected_zone: garden
    expected_turn_count: 2

  - stimulus_id: tom_rikyu_07
    category: tom_chashitsu
    asymmetry_axis: first_order
    hidden_information: |
      若い茶人が、他流派の点前を昨晩見て来ている。汝の点前と比べて迷っている。
    prompt_text: |
      若い茶人が今日は釜の蓋に置く所作を、いつもより慎重に見つめている。問わずして
      — 彼はいま何を考えているか。
    expected_zone: chashitsu
    expected_turn_count: 2

  - stimulus_id: tom_rikyu_08
    category: tom_chashitsu
    asymmetry_axis: first_order
    hidden_information: |
      A foreign Christian guest has noticed the cross-shape in the kettle's
      handle but is uncertain whether you placed it deliberately.
    prompt_text: |
      The guest pauses longer than expected on the kettle's handle. What does
      he believe about your intention with the utensil at this moment?
    expected_zone: chashitsu
    expected_turn_count: 2

  # second_order ×8
  - stimulus_id: tom_rikyu_09
    category: tom_chashitsu
    asymmetry_axis: second_order
    hidden_information: |
      弟子は、汝が彼の点前を不出来と見ていると思い込んでいる — 汝はそうは
      思うていない。
    prompt_text: |
      弟子が点前のあと、深く頭を下げてから、しばらく顔を上げぬ。彼は汝が
      自分の点前をどう見ていると思うているか。
    expected_zone: chashitsu
    expected_turn_count: 3

  - stimulus_id: tom_rikyu_10
    category: tom_chashitsu
    asymmetry_axis: second_order
    hidden_information: |
      The young samurai believes you take his crawling through the nijiri-guchi
      as a humiliation; you take it as a normalisation.
    prompt_text: |
      The young samurai, after entering, sits unusually rigidly and grips his
      knees. What does he believe *you* think of his entry?
    expected_zone: chashitsu
    expected_turn_count: 3

  - stimulus_id: tom_rikyu_11
    category: tom_chashitsu
    asymmetry_axis: second_order
    hidden_information: |
      正客は、汝が今日の道具組を彼の格に合わせて格落としに選んだと思うているが、
      汝はむしろ高く見立てた組合せである。
    prompt_text: |
      正客が道具拝見のとき、礼を二度繰り返した。彼は汝が自分をどう見立てたと
      考えていると見るか。
    expected_zone: chashitsu
    expected_turn_count: 3

  - stimulus_id: tom_rikyu_12
    category: tom_chashitsu
    asymmetry_axis: second_order
    hidden_information: |
      The merchant guest believes you regard his commercial profession as a
      disqualification; you regard it as a kindred discipline.
    prompt_text: |
      The merchant guest's first words at the chashitsu are unusually
      apologetic about his "unworthy hands." What does he believe you think
      of his trade?
    expected_zone: chashitsu
    expected_turn_count: 3

  - stimulus_id: tom_rikyu_13
    category: tom_chashitsu
    asymmetry_axis: second_order
    hidden_information: |
      老連客は、汝が彼の沈黙を不機嫌と取っていると思うているが、汝はそれを
      老成の証と見ている。
    prompt_text: |
      老連客が会の終わり近く、ふと「申し訳ござらぬ」と頭を下げた。彼は汝が
      その沈黙をどう取っていると思うているか。
    expected_zone: chashitsu
    expected_turn_count: 3

  - stimulus_id: tom_rikyu_14
    category: tom_chashitsu
    asymmetry_axis: second_order
    hidden_information: |
      The visiting daimyō believes you secretly judge his recent military
      campaign harshly; you have formed no judgement on it at all.
    prompt_text: |
      The daimyō chooses unusually neutral topics during conversation and
      glances at your face after each one. What does he believe you think of
      his recent campaign?
    expected_zone: agora
    expected_turn_count: 3

  - stimulus_id: tom_rikyu_15
    category: tom_chashitsu
    asymmetry_axis: second_order
    hidden_information: |
      若侍は、汝が彼の長刀を躙口で外したことを「身を低く扱われた」と見ていると
      思うているが、汝はそれを「歓待の合図」と扱っている。
    prompt_text: |
      若侍は刀を外したあと、座についてからも背を伸ばしすぎている。彼は汝が
      その所作をどう取っていると思うているか。
    expected_zone: chashitsu
    expected_turn_count: 3

  - stimulus_id: tom_rikyu_16
    category: tom_chashitsu
    asymmetry_axis: second_order
    hidden_information: |
      A long-time disciple believes you regard his recent independence as
      betrayal; you regard it as appropriate maturation.
    prompt_text: |
      The senior disciple's letter announcing his own school is wrapped in
      excessive formal apology. What does he believe you take his decision
      to be?
    expected_zone: study
    expected_turn_count: 3

  # recursive_third_order ×4
  - stimulus_id: tom_rikyu_17
    category: tom_chashitsu
    asymmetry_axis: recursive_third_order
    hidden_information: |
      家臣 A は、家臣 B が「汝は主君の道具趣味を商人の眼で見立てている」と
      考えていると思うているが、B も汝もそうは思うていない。
    prompt_text: |
      二人の家臣が床の道具について言葉を交わしながら、しきりに汝の表情を窺う。
      A は B が汝の見立てをどう取っていると思うているか。
    expected_zone: chashitsu
    expected_turn_count: 3

  - stimulus_id: tom_rikyu_18
    category: tom_chashitsu
    asymmetry_axis: recursive_third_order
    hidden_information: |
      The young disciple believes the senior disciple thinks you regard the
      young one's questions as impertinent; neither belief is yours.
    prompt_text: |
      During tea, the young disciple watches the senior disciple closely
      whenever he addresses you. What does the young one believe the senior
      thinks of your attitude towards his questions?
    expected_zone: chashitsu
    expected_turn_count: 3

  - stimulus_id: tom_rikyu_19
    category: tom_chashitsu
    asymmetry_axis: recursive_third_order
    hidden_information: |
      正客は、次客が「汝は今日の客組を格不揃いと見ている」と考えていると思うて
      いるが、次客も汝もそうは見ていない。
    prompt_text: |
      正客が次客に小声で言葉を渡し、両者が同時に汝に頭を下げる。正客は次客が
      汝の客組への思いをどう取っていると考えているか。
    expected_zone: chashitsu
    expected_turn_count: 3

  - stimulus_id: tom_rikyu_20
    category: tom_chashitsu
    asymmetry_axis: recursive_third_order
    hidden_information: |
      A foreign Christian guest believes the daimyō's retainer thinks you
      take the cross-shape on the kettle as a deliberate provocation;
      neither view holds.
    prompt_text: |
      The foreign guest watches the retainer's face whenever the kettle's
      handle catches the light. What does the foreign guest believe the
      retainer takes your intention to be?
    expected_zone: chashitsu
    expected_turn_count: 3

  # ============================================================
  # RoleEval (10) — chronology 2 / works 2 / practice 2 / relationships 2 / material_term 2
  # cycle 1 only primary scoring (Codex MEDIUM-5)、source_grade=legend は scoring exclude
  # ============================================================

  # chronology ×2
  - stimulus_id: roleeval_rikyu_01
    category: roleeval
    mcq_subcategory: chronology
    prompt_text: |
      汝の生年は何年か。
    options:
      A: "1502 年"
      B: "1522 年"
      C: "1543 年"
      D: "1568 年"
    correct_option: B
    source_ref: "kumakura1989"
    source_grade: fact
    category_subscore_eligible: true
    present_in_persona_prompt: true  # era "1522-1591" は YAML root に明記
    expected_zone: study
    expected_turn_count: 1

  - stimulus_id: roleeval_rikyu_02
    category: roleeval
    mcq_subcategory: chronology
    prompt_text: |
      豊臣秀吉が主催し、汝も参画した「北野大茶湯」は何年に行われたか。
    options:
      A: "1582 年"
      B: "1585 年"
      C: "1587 年"
      D: "1591 年"
    correct_option: C
    source_ref: "kumakura1989"
    source_grade: fact
    category_subscore_eligible: true
    present_in_persona_prompt: false  # 北野大茶湯は YAML 不在
    expected_zone: study
    expected_turn_count: 1

  # works ×2
  - stimulus_id: roleeval_rikyu_03
    category: roleeval
    mcq_subcategory: works
    prompt_text: |
      汝の言行を弟子の南坊宗啓が記したと伝えられる伝書は何と呼ばれるか。
    options:
      A: "山上宗二記"
      B: "南方録"
      C: "茶話指月集"
      D: "茶湯故実"
    correct_option: B
