# M13-ES4 curated common-use anchor for the rarity reference R_object (§2.2b).
#
# This is the hand-frozen "authoritative common use" anchor (step 1 of the
# R_object recipe). rarity(idea) = 1 - max cos(idea, R_object), so a use close to
# one of these canonical common uses scores LOW rarity. Held-out high-frequency
# augmentation (step 2) is added at run time from verdict-disjoint REF_SEEDS;
# this file is its frozen human anchor. Exactly N_CURATED=10 per object, keyed by
# the same object_id as aut_battery.yaml. content-hash pinned in the run manifest.
#
# Refs: schema ./_schema.yaml ; recipe design-final.md §2.2b

