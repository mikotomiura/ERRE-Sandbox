# M13-ES4 frozen adversarial labeled set (scorer/judge AUC gate, §3).
#
# >=120 strings across one positive class (appropriate) and six negative
# categories. Drives the appropriateness-judge AUC gate (>= AUC_FLOOR 0.80): the
# binary on-task-use judge must separate ``appropriate`` (a valid use of the
# object) from ``inappropriate`` (garbage / word-salad / off-task / wrong-object /
# vague-metaphor). ``common_use_only`` is labeled ``appropriate`` — it IS a valid
# on-task use; the *rarity* scorer (against R_object), not the appropriateness
# gate, is what penalises commonness. This frozen set mitigates self-judge
# circularity (Codex M-4). Labels are fixed at pre-registration.
#
# Refs: schema ./_schema.yaml ; gate design-final.md §2.3 / §3

schema_version: "0.1.0-m13es4"

